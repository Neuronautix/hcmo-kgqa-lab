# ===========================================================================
# HCMO upstream sync manifest
# ===========================================================================
# This is the SINGLE PLACE to edit when the upstream HCMO repository changes
# its file names, adds/removes modules, or moves things around.
#
# The sync layer (scripts/sync_hcmo.py) is ontology-agnostic: it does NOT
# hardcode any class names, property names, or the upstream namespace. It only
# knows the repo URL, the git ref to track, and this list of file mappings.
# When a new HCMO is published with different file names, update the `files`
# list below and re-run `make sync-hcmo` -- nothing else needs to change.
#
# Upstream now publishes a stable release manifest (hcmo.yaml) and a built
# dist/ directory (merged ontology + profile). We prefer the merged
# dist/hcmo.ttl as the primary ontology so the lab consumes exactly what the
# HCMO repo publishes, rather than re-merging modules itself.
#
# Each mapping has:
#   src  : path of the file inside the upstream repo
#   dest : path (relative to this lab's repo root) to vendor the file into
#   kind : one of ontology | shapes | queries | examples | context | manifest
# ===========================================================================

repo_url: https://github.com/dhuzard/HCMO

# Track `main` by default. Pin to a tag or commit SHA here (or via --ref /
# HCMO_REF) for reproducible builds; the resolved commit SHA is always
# recorded in sync/HCMO_SYNC.lock.json regardless of what `ref` says.
ref: main

# The merged, built ontology published by upstream. Used for namespace
# detection, the term-diff report and the vendored profile.
primary_ontology: ontology/vendor/hcmo/hcmo.ttl

files:
  # --- Upstream release manifest (the contract) ----------------------------
  - src: hcmo.yaml
    dest: ontology/vendor/hcmo/hcmo.yaml
    kind: manifest

  # --- Built / merged ontology artifacts (preferred entry points) ----------
  - src: dist/hcmo.ttl
    dest: ontology/vendor/hcmo/hcmo.ttl
    kind: ontology
  - src: dist/hcmo.owl
    dest: ontology/vendor/hcmo/hcmo.owl
    kind: ontology
  - src: dist/hcmo.json
    dest: ontology/vendor/hcmo/hcmo.json
    kind: context
  - src: dist/profile.json
    dest: ontology/vendor/hcmo/upstream_profile.json
    kind: manifest

  # --- Hand-authored modular sources (kept for reference / reasoning) -------
  - src: ontology/modules/hcm-core.ttl
    dest: ontology/vendor/hcmo/modules/hcm-core.ttl
    kind: ontology
  - src: ontology/modules/hcm-bio.ttl
    dest: ontology/vendor/hcmo/modules/hcm-bio.ttl
    kind: ontology
  - src: ontology/modules/hcm-env.ttl
    dest: ontology/vendor/hcmo/modules/hcm-env.ttl
    kind: ontology
  - src: ontology/modules/hcm-obs.ttl
    dest: ontology/vendor/hcmo/modules/hcm-obs.ttl
    kind: ontology

  # --- JSON-LD context -----------------------------------------------------
  - src: ontology/context.jsonld
    dest: ontology/vendor/hcmo/context.jsonld
    kind: context

  # --- SHACL shapes --------------------------------------------------------
  - src: shapes/hcm-shapes.ttl
    dest: shapes/vendor/hcmo/hcm-shapes.ttl
    kind: shapes

  # --- Competency queries --------------------------------------------------
  - src: queries/competency_questions.yaml
    dest: sparql/vendor/hcmo/queries/competency_questions.yaml
    kind: queries
  - src: queries/cq-animals-by-enclosure.rq
    dest: sparql/vendor/hcmo/queries/cq-animals-by-enclosure.rq
    kind: queries
  - src: queries/cq-missing-dimensions.rq
    dest: sparql/vendor/hcmo/queries/cq-missing-dimensions.rq
    kind: queries
  - src: queries/cq-needs-provisioning.rq
    dest: sparql/vendor/hcmo/queries/cq-needs-provisioning.rq
    kind: queries
  - src: queries/cq-sensors-behaviors.rq
    dest: sparql/vendor/hcmo/queries/cq-sensors-behaviors.rq
    kind: queries
  - src: queries/cq-systems-24h-limited.rq
    dest: sparql/vendor/hcmo/queries/cq-systems-24h-limited.rq
    kind: queries

  # --- Example A-boxes -----------------------------------------------------
  - src: examples/abox-minimal.ttl
    dest: kg/vendor/hcmo/examples/abox-minimal.ttl
    kind: examples
  - src: examples/abox-edge-cases.ttl
    dest: kg/vendor/hcmo/examples/abox-edge-cases.ttl
    kind: examples
