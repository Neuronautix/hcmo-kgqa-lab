services:
  fuseki:
    image: stain/jena-fuseki
    container_name: hcmo-fuseki
    ports:
      - "3030:3030"
    environment:
      ADMIN_PASSWORD: admin
    volumes:
      - fuseki-data:/fuseki
      - ./ontology:/data/ontology
      - ./kg:/data/kg
      - ./shacl:/data/shacl

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hcmo-kgqa-ui
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      # Inside the compose network Fuseki is reachable by its service name, not
      # localhost. This explicit value overrides FUSEKI_BASE_URL from .env (which
      # stays http://localhost:3030 for non-Docker `make ui` development).
      FUSEKI_BASE_URL: http://fuseki:3030
      # Put the project root on sys.path so `import app` resolves to the mounted
      # ./app volume (current code + assets) instead of the frozen copy that
      # `pip install .` baked into site-packages. Without this, Streamlit imports
      # the build-time package — ignoring volume edits and resolving asset paths
      # (ontology/profiles) under site-packages, where they don't exist.
      PYTHONPATH: /app
    depends_on:
      - fuseki
    volumes:
      - ./ontology:/app/ontology
      - ./kg:/app/kg
      - ./shacl:/app/shacl
      - ./sparql:/app/sparql
      - ./app:/app/app

volumes:
  fuseki-data:
